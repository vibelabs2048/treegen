name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.2.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag
        run: |
          case "$TAG" in
            v*) ;;
            *)
              echo "Expected a version tag starting with v, got: $TAG"
              exit 1
              ;;
          esac

      - name: Create GitHub release if needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: npm run desktop:dist:mac
          - os: windows-latest
            script: npm run desktop:dist:win
          - os: ubuntu-latest
            script: npm run desktop:dist:linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native app deps for Electron
        run: npm run desktop:rebuild

      - name: Build desktop package
        run: ${{ matrix.script }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: treegen-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*Setup*.exe
            dist/TreeGen*.exe

  publish-assets:
    needs: build
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" release-assets/* --clobber
